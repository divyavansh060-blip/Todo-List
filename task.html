<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Task Detail</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{
 box-sizing: border-box;
 font-family: 'Poppins', sans-serif;
}

body{
 margin:0;
 background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb,#a18cd1);
 transition:0.3s;
}

body.dark{
 background:#121212;
 color:white;
}

body.dark .task-box{
 background:#1e1e1e;
 color:white;
}

body.dark input,
body.dark textarea,
body.dark select{
 background:#2c2c2c;
 color:white;
 border:1px solid #555;
}

.page{
 min-height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
 padding:20px;
}

.task-box{
 background:white;
 width:100%;
 max-width:420px;
 padding:25px;
 border-radius:18px;
 box-shadow:0 15px 35px rgba(0,0,0,0.25);
 animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
 from{opacity:0; transform:translateY(20px);}
 to{opacity:1; transform:translateY(0);}
}

h2{text-align:center;color:#6a1b9a; margin-top: 5px;}

.section{
 margin-top:15px;
 padding: 10px;
 background: #f9f9f9;
 border-radius: 12px;
 border: 1px solid #eee;
}
body.dark .section {
 background: #252525;
 border-color: #333;
}

.task-text{
 background:#185a9d;
 color:white;
 padding:12px;
 border-radius:12px;
 font-size:18px;
 font-weight:600;
 text-align:center;
 word-break: break-word;
}

input,select,textarea{
 width:100%;
 padding:10px;
 border-radius:10px;
 border:1px solid #ccc;
 margin-top:8px;
 font-size:14px;
 transition:0.25s;
 outline: none;
}

textarea{
 resize:none;
 height:90px;
}

button{
 width:100%;
 padding:10px;
 border:none;
 border-radius:12px;
 background:linear-gradient(135deg,#ff9800,#f44336);
 color:white;
 font-weight:600;
 cursor:pointer;
 margin-top:10px;
 transition:0.25s;
 box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

button:hover{
 opacity:0.95;
 transform:translateY(-2px);
 box-shadow:0 6px 15px rgba(0,0,0,0.25);
}

button:active{
 transform:scale(0.97);
}

input:focus, textarea:focus, select:focus{
 border:1px solid #6a1b9a;
 box-shadow:0 0 8px rgba(106,27,154,0.4);
}

li{
 list-style:none;
 background:#f2f2f2;
 padding:8px;
 border-radius:6px;
 margin-top:6px;
 display:flex;
 align-items:center;
 gap:6px;
 word-break: break-word;
}

body.dark li{
 background:#333;
}

ul{padding:0;margin:0;}

#progress{text-align:center;margin-top:10px;font-weight:600;}
#bar{
 height:10px;
 background:linear-gradient(90deg,#4caf50,#8bc34a);
 border-radius:10px;
 width:0%;
 transition:0.4s;
}

.small-btn{
 padding:4px 8px;
 font-size:11px;
 border-radius:5px;
 width:auto;
 margin-top: 0;
}

.edit-btn{background:#2196f3;}
.delete-btn{background:#f44336;}

#dashboard{
 text-align:center;
 font-weight:600;
 margin-bottom:15px;
 padding:10px;
 border-radius:10px;
 background:#f3e5f5;
 color:#4a148c;
}

.top-actions{
 display:flex;
 gap:10px;
 margin-bottom:15px;
 align-items: center;
}

.top-actions button{
 flex:1;
 margin-top: 0;
}

/* Timer Display Style */
#timerDisplay {
 font-size: 24px;
 font-weight: bold;
 text-align: center;
 color: #e53935;
 margin-top: 5px;
}
</style>
</head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<body>

<div class="page">
<div class="task-box">

<div id="profileBox" style="display:none; padding:15px; border-radius:12px; margin-bottom:15px; background:#ede7f6;">
  <div style="text-align:center; margin-bottom: 10px;">
    <img id="profilePic" src="" style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid #6a1b9a;">
    <input type="file" id="uploadPic" accept="image/*" style="margin-top:10px;">
  </div>
  <input id="profileNameInput" placeholder="Enter Name">
  <input id="profileEmailInput" placeholder="Enter Email">
  <input type="password" id="oldPass" placeholder="Old Password">
  <input type="password" id="newPass" placeholder="New Password">
  <button onclick="saveProfile()">💾 Save Profile</button>
  <button onclick="changePassword()">🔐 Change Password</button>
</div>

<div class="top-actions">
<img id="topProfile" src="" style="width:40px;height:40px;border-radius:50%; object-fit: cover; border: 1px solid #ccc;">
<button onclick="toggleDark()">🌙 Dark</button>
<button onclick="editProfile()">👤 Edit</button>
</div>

<div id="dashboard"></div>
<div id="userInfo" style="text-align: center; font-weight: 300; margin-bottom: 5px;"></div>
<div id="taskText" class="task-text"></div>

<div class="section">
 <b>🏷️ Task Category (નવું ફંક્શન)</b>
 <select id="taskCategory" onchange="saveCategory()">
   <option value="General">General / Others</option>
   <option value="Work">💼 Work / Professional</option>
   <option value="Personal">🏠 Personal Life</option>
   <option value="Urgent">🚨 Urgent / Important</option>
 </select>
</div>

<div class="section">
 <b>⏰ Notification Reminder & Priority</b>
 <select id="priority">
  <option value="">Select Priority</option>
  <option value="High">High</option>
  <option value="Medium">Medium</option>
  <option value="Low">Low</option>
 </select>
 <input type="datetime-local" id="schedule">
 <button onclick="setManualNotification()">🔔 Set Alert Notification</button>
</div>

<div class="section">
 <b>⏳ Task Countdown Timer (ટાઈમર સેટ કરો)</b>
 <div style="display: flex; gap: 5px; margin-top: 8px;">
   <input type="number" id="timerMinutes" placeholder="Minutes" min="1" style="margin-top:0;">
   <button onclick="startTimer()" style="margin-top:0; width: auto; padding: 10px 15px;">Start</button>
   <button onclick="resetTimer()" style="margin-top:0; width: auto; padding: 10px 15px; background: #777;">Reset</button>
 </div>
 <div id="timerDisplay">00:00</div>
</div>

<div class="section">
 <b>📝 Plan Input</b>
 <textarea id="planInput" placeholder="Write your plan..."></textarea>
 <button onclick="savePlan()">Save Plan</button>
</div>

<div class="section">
 <b>🎯 Activities</b>
 <input id="activityInput" placeholder="Add activity">
 <button onclick="addActivity()">Add Activity</button>
 <ul id="activityList"></ul>
</div>

<div class="section">
 <b>🏁 Project Steps</b>
 <input id="stepInput" placeholder="Add step">
 <button onclick="addStep()">Add Step</button>
 <div id="progress">Progress: 0%</div>
 <div style="background:#ddd;border-radius:10px; margin-top: 5px;">
 <div id="bar"></div>
 </div>
 <ul id="stepList"></ul>
</div>

<button onclick="viewPlan()">👁 View Saved Plan</button>
<button onclick="clearHistory()">🗑 Clear History</button>
<button onclick="exportExcel()">📊 Export Excel</button>
<button onclick="goBack()">⬅ Back</button>
<button onclick="logout()">Logout</button>

</div>
</div>

<script>
const planInput = document.getElementById("planInput");
const activityInput = document.getElementById("activityInput");
const activityList = document.getElementById("activityList");
const stepInput = document.getElementById("stepInput");
const stepList = document.getElementById("stepList");
const progress = document.getElementById("progress");
const bar = document.getElementById("bar");
const dashboard = document.getElementById("dashboard");
const schedule = document.getElementById("schedule");
const profileNameInput = document.getElementById("profileNameInput");
const profileEmailInput = document.getElementById("profileEmailInput");
const profilePic = document.getElementById("profilePic");
const taskCategory = document.getElementById("taskCategory");

let countdownInterval;

const currentUser = localStorage.getItem("userEmail") || sessionStorage.getItem("userEmail");
if(!currentUser) window.location="index.html";

/* REQUEST NOTIFICATION PERMISSION */
if("Notification" in window){
 Notification.requestPermission();
}

if(localStorage.getItem("darkMode") === "on"){
 document.body.classList.add("dark");
}

function toggleDark(){
 document.body.classList.toggle("dark");
 localStorage.setItem("darkMode", document.body.classList.contains("dark") ? "on" : "off");
}

function editProfile(){
 let box = document.getElementById("profileBox");
 box.style.display = box.style.display === "none" ? "block" : "none";
 profileNameInput.value = localStorage.getItem("profile_name") || "";
 profileEmailInput.value = currentUser;
 profilePic.src = localStorage.getItem("profile_pic") || "https://via.placeholder.com/80";
}

document.getElementById("topProfile").src = localStorage.getItem("profile_pic") || "https://via.placeholder.com/40"; 

document.getElementById("uploadPic").addEventListener("change", function(){
 let file = this.files[0];
 let reader = new FileReader();
 reader.onload = function(){
   localStorage.setItem("profile_pic", reader.result);
   profilePic.src = reader.result;
   document.getElementById("topProfile").src = reader.result;
 };
 if(file) reader.readAsDataURL(file);
});

function saveProfile(){
 localStorage.setItem("profile_name", profileNameInput.value.trim());
 alert("Profile Updated ✅");
 location.reload();
}

document.getElementById("userInfo").innerText = "Welcome, " + (localStorage.getItem("profile_name") || "User");

const task = (localStorage.getItem("openTask") || "").trim();
if(!task){
 alert("No task found!");
 window.location = "todo.html";
}
document.getElementById("taskText").innerText = task;

let stepsKey = "steps_" + task;
let activityKey = "activity_" + task;
let planKey = "plan_" + task;
let categoryKey = "category_" + task;

function getArr(key){
 try{ return JSON.parse(localStorage.getItem(key)) || []; }
 catch{ return []; }
}

/* NEW FUNCTION: Save Task Category */
function saveCategory(){
 localStorage.setItem(categoryKey, taskCategory.value);
 showToast("Category Updated: " + taskCategory.value + " 🏷️");
}

function loadCategory(){
 taskCategory.value = localStorage.getItem(categoryKey) || "General";
}

/* TIMER FUNCTIONS */
function startTimer() {
 clearInterval(countdownInterval);
 let minutesInput = document.getElementById("timerMinutes").value;
 if(!minutesInput || minutesInput <= 0) {
   alert("Please enter valid minutes!");
   return;
 }
 
 let timeRemaining = minutesInput * 60;
 const display = document.getElementById("timerDisplay");

 countdownInterval = setInterval(() => {
   let mins = Math.floor(timeRemaining / 60);
   let secs = timeRemaining % 60;

   mins = mins < 10 ? "0" + mins : mins;
   secs = secs < 10 ? "0" + secs : secs;

   display.innerText = mins + ":" + secs;

   if (timeRemaining <= 0) {
     clearInterval(countdownInterval);
     display.innerText = "00:00";
     triggerTimerAlert();
   }
   timeRemaining--;
 }, 1000);
 showToast("Timer Started ⏳");
}

function resetTimer() {
 clearInterval(countdownInterval);
 document.getElementById("timerDisplay").innerText = "00:00";
 document.getElementById("timerMinutes").value = "";
 showToast("Timer Reset 🔄");
}

function triggerTimerAlert() {
 if(Notification.permission === "granted"){
   new Notification("⏰ Timer Finished!", { body: `Time is up for task: "${task}"` });
 }
 alert(`🔔 Time is up for: ${task}`);
}

/* NOTIFICATION REMINDER SYSTEM */
function setManualNotification() {
 let time = schedule.value;
 if(!time) {
   alert("Please select a date and time first!");
   return;
 }
 let now = new Date().getTime();
 let taskTime = new Date(time).getTime();
 let delay = taskTime - now;

 if(delay <= 0) {
   alert("Please select a future time!");
   return;
 }

 setTimeout(() => {
   if(Notification.permission === "granted"){
     new Notification("⏰ Task Reminder Alert", {
       body: `It's time to work on: ${task}`,
       icon: localStorage.getItem("profile_pic") || ""
     });
   } else {
     alert(`⏰ Reminder: ${task}`);
   }
 }, delay);

 showToast("Notification Schedule Set Successfully! 🔔");
}

function savePlan(){
  let key = "plans_" + task;
  let arr = JSON.parse(localStorage.getItem(key) || "[]");
  let text = planInput.value.trim();
  if(!text) return;
  arr.push({ text: text, date: new Date().toLocaleString() });
  localStorage.setItem(key, JSON.stringify(arr));
  planInput.value = "";
  localStorage.removeItem(planKey); 
  showToast("Plan Saved ✅");
}

/* DATA RENDERING */
function loadActivities(){
 let acts = getArr(activityKey);
 activityList.innerHTML="";
 acts.forEach((a,i)=>{
   activityList.innerHTML+=`
   <li>
   <input type="checkbox" ${a.done?"checked":""} onchange="toggleActivity(${i})">
   <span style="flex:1;${a.done?'text-decoration:line-through;color:gray;':''}">${a.text}</span>
   <button class="small-btn edit-btn" onclick="editActivity(${i})">Edit</button>
   <button class="small-btn delete-btn" onclick="deleteActivity(${i})">Delete</button>
   </li>`;
 });
 updateDashboard();
}

function addActivity(){
 let val=activityInput.value.trim();
 if(!val) return;
 let arr=getArr(activityKey);
 arr.push({text:val,done:false});
 localStorage.setItem(activityKey,JSON.stringify(arr));
 activityInput.value = "";
 loadActivities();
}

function toggleActivity(i){
 let arr=getArr(activityKey);
 arr[i].done=!arr[i].done;
 localStorage.setItem(activityKey,JSON.stringify(arr));
 loadActivities();
}

function deleteActivity(i){
 let arr=getArr(activityKey);
 arr.splice(i,1);
 localStorage.setItem(activityKey,JSON.stringify(arr));
 loadActivities();
}

function editActivity(i){
 let arr=getArr(activityKey);
 let v=prompt("Edit",arr[i].text);
 if(v && v.trim() !== ""){
   arr[i].text=v.trim();
   localStorage.setItem(activityKey,JSON.stringify(arr));
   loadActivities();
 }
}

function loadSteps(){
 let steps=getArr(stepsKey);
 stepList.innerHTML="";
 steps.forEach((s,i)=>{
   stepList.innerHTML+=`
   <li>
   <input type="checkbox" ${s.done?"checked":""} onchange="toggleDone(${i})">
   <span style="flex:1;${s.done?'text-decoration:line-through;color:gray;':''}">${s.text}</span>
   <button class="small-btn edit-btn" onclick="editStep(${i})">Edit</button>
   <button class="small-btn delete-btn" onclick="deleteStep(${i})">Delete</button>
   </li>`;
 });
 updateDashboard();
}

function addStep(){
 let v=stepInput.value.trim();
 if(!v) return;
 let steps=getArr(stepsKey);
 steps.push({text:v,done:false});
 localStorage.setItem(stepsKey,JSON.stringify(steps));
 stepInput.value = "";
 loadSteps();
}

function toggleDone(i){
 let steps=getArr(stepsKey);
 steps[i].done=!steps[i].done;
 localStorage.setItem(stepsKey,JSON.stringify(steps));
 loadSteps();
}

function deleteStep(i){
 let steps=getArr(stepsKey);
 steps.splice(i,1);
 localStorage.setItem(stepsKey,JSON.stringify(steps));
 loadSteps();
}

function editStep(i){
 let steps=getArr(stepsKey);
 let v=prompt("Edit",steps[i].text);
 if(v && v.trim() !== ""){
   steps[i].text=v.trim();
   localStorage.setItem(stepsKey,JSON.stringify(steps));
   loadSteps();
 }
}

function updateDashboard(){
 let steps = getArr(stepsKey);
 let acts = getArr(activityKey);
 let total = steps.length + acts.length;
 let done = 0;

 steps.forEach(s=>{if(s.done) done++;});
 acts.forEach(a=>{if(a.done) done++;});

 let pending = total - done;
 let percent = total ? Math.round((done/total)*100) : 0;

 progress.innerText = "Progress: " + percent + "%";
 bar.style.width = percent + "%";

 if(percent < 30) bar.style.background = "#f44336";
 else if(percent < 70) bar.style.background = "#ff9800";
 else bar.style.background = "#4caf50";

 dashboard.innerHTML = `
 <div style="display:flex;justify-content:space-around;">
   <span>📋 total ${total}</span>
   <span>⏳ pending ${pending}</span>
   <span>✅ done ${done}</span>
 </div>`;
}

function exportExcel(){
 let wb = XLSX.utils.book_new();
 let data = [["TASK REPORT"], [task], [], ["No", "Description", "Status / Date"]];
 let ws = XLSX.utils.aoa_to_sheet(data);
 XLSX.utils.book_append_sheet(wb, ws, "Task Report");
 XLSX.writeFile(wb, task + "_REPORT.xlsx");
}

function showToast(msg){
 let t = document.createElement("div");
 t.innerText = msg;
 t.style.position = "fixed";
 t.style.bottom = "20px";
 t.style.left = "50%";
 t.style.transform = "translateX(-50%)";
 t.style.background = "#333";
 t.style.color = "#fff";
 t.style.padding = "10px 20px";
 t.style.borderRadius = "8px";
 t.style.zIndex = "9999";
 document.body.appendChild(t);
 setTimeout(()=>{ t.remove(); },2000);
}

function clearHistory(){
 if(confirm("Clear all data?")){
   localStorage.removeItem(stepsKey);
   localStorage.removeItem(activityKey);
   localStorage.removeItem(planKey);
   localStorage.removeItem(categoryKey);
   location.reload();
 }
}

function goBack(){window.location="todo.html";}
function logout(){sessionStorage.clear(); location="index.html";}

window.addEventListener("DOMContentLoaded", () => {
 loadActivities();
 loadSteps();
 loadCategory();
});
function viewPlan(){ window.location = "show_plan.html"; } 
</script>
</body>
</html>
