<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
/* Applied global box-sizing to manage paddings and widths perfectly */
*{
 box-sizing: border-box;
 font-family: Poppins, sans-serif;
}

body{
 margin:0;
 min-height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
 background:linear-gradient(135deg,#667eea,#764ba2);
}

.box{
 background:white;
 padding:30px;
 border-radius:18px;
 width:350px;
 text-align:center;
 box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

h2{
 color:#6a1b9a;
 margin-bottom:10px;
}

p{
 color:#555;
 font-size:14px;
}

input{
 width:100%;
 padding:12px;
 margin:15px 0;
 border-radius:10px;
 border:1px solid #ccc;
 outline:none;
}

button{
 width:100%;
 padding:12px;
 border:none;
 border-radius:10px;
 background:linear-gradient(135deg,#f7971e,#ffd200);
 color:white;
 font-weight:bold;
 cursor:pointer;
 font-size:15px;
 transition: opacity 0.2s;
}

button:hover{
 opacity:0.9;
}

#msg{
 margin-top:10px;
 font-size:14px;
 min-height: 20px; /* Reserves space to prevent structural jumps */
}

.back{
 margin-top:15px;
 color:#3949ab;
 cursor:pointer;
 text-align:center;
}
</style>
</head>

<body>

<div class="box">
<h2>🔐 Forgot Password</h2>
<p>Enter your registered email to reset password</p>

<input id="email" type="email" placeholder="Enter Email">

<button onclick="reset()">Send Reset Link</button>

<p id="msg"></p>
<p class="back" onclick="location.href='index.html'">
 ⬅ Back to Login
</p>

</div>

<script>
/* Simple email syntax verification */
function isValidEmail(email){
 return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function reset(){
 let email = document.getElementById("email").value.trim();
 let msg = document.getElementById("msg");

 // Clean status display
 msg.innerText = "";

 if(email === ""){
   msg.style.color = "red";
   msg.innerText = "Please enter your email";
   return;
 }

 if(!isValidEmail(email)){
   msg.style.color = "red";
   msg.innerText = "Enter a valid email address";
   return;
 }

 let savedPass = localStorage.getItem(email + "_pass");

 if(savedPass == null){
   msg.style.color = "red";
   msg.innerText = "Email not registered";
   return;
 }

 // Store token for the upcoming newpassword.html validation
 localStorage.setItem("reset_email", email);

 msg.style.color = "green";
 msg.innerText = "Reset link verified. Redirecting...";

 setTimeout(()=>{
  location.href = "newpassword.html";
 }, 1500);
}
</script>
</body>
</html>
