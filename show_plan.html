<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Saved Plans</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
/* Applied global box-sizing to manage paddings and alignment perfectly */
*{
 box-sizing: border-box;
 font-family: 'Poppins', sans-serif;
}

body{
 margin:0;
 background:linear-gradient(135deg,#a18cd1,#fbc2eb);
 display:flex;
 justify-content:center;
 align-items:center;
 min-height:100vh;
 padding:15px;
}

.box{
 background:white;
 padding:20px;
 width:100%;
 max-width:420px;
 border-radius:15px;
 box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{text-align:center;color:#6a1b9a;margin-top: 5px;}

.plan{
 background:#f3e5f5;
 padding:10px;
 border-radius:10px;
 margin-top:10px;
 word-break: break-word; /* Prevents long unbreakable words from blowing out layout */
}

.plan small{color:#555;}

.actions{
 display:flex;
 gap:5px;
 margin-top:8px;
}

button{
 padding:6px 12px;
 border:none;
 border-radius:6px;
 cursor:pointer;
 font-size:12px;
 color:white;
 font-weight: 600;
 transition: opacity 0.2s;
}

button:hover{
 opacity: 0.9;
}

.edit{background:#2196f3;}
.delete{background:#f44336;}

.top-btn{
 width:100%;
 margin-top:15px;
 padding:10px;
 border-radius:10px;
 font-size:14px;
 background:linear-gradient(135deg,#ff9800,#f44336);
}

#analytics{
 margin-top:10px;
 padding:10px;
 background:#ede7f6;
 border-radius:10px;
 font-size:13px;
 line-height: 1.5;
}

#planList {
 margin-top: 5px;
 max-height: 300px;
 overflow-y: auto; /* Adds clean scroll if plan count gets high */
}

.empty-msg {
 text-align: center;
 color: #777;
 padding: 20px 0;
 font-size: 14px;
}
</style>
</head>

<body>

<div class="box">
<h2>📄 Saved Plans</h2>

<div id="analytics"></div>

<div id="planList"></div>

<button class="top-btn" onclick="goBack()">⬅ Back</button>
</div>

<script>
const task = localStorage.getItem("openTask") || "default";
let key = "plans_" + task;

/* GET DATA */
function getPlans(){
 return JSON.parse(localStorage.getItem(key) || "[]");
}

/* SAVE DATA */
function savePlans(data){
 localStorage.setItem(key, JSON.stringify(data));
}

/* LOAD PLANS */
function loadPlans(){
 let arr = getPlans();
 let html = "";

 arr.forEach((p,i)=>{
 html += `
 <div class="plan">
 <b>${p.text}</b><br>
 <small>🕒 ${p.date}</small>

 <div class="actions">
 <button class="edit" onclick="editPlan(${i})">Edit</button>
 <button class="delete" onclick="deletePlan(${i})">Delete</button>
 </div>
 </div>
 `;
 });

 document.getElementById("planList").innerHTML =
 html || `<div class="empty-msg">No Plans Found ❌</div>`;

 updateAnalytics(arr);
}

/* EDIT */
function editPlan(i){
 let arr = getPlans();
 let newText = prompt("Edit Plan", arr[i].text);

 if(newText && newText.trim() !== ""){
 arr[i].text = newText.trim();
 arr[i].date = new Date().toLocaleString();
 savePlans(arr);
 loadPlans();
 }
}

/* DELETE */
function deletePlan(i){
 let arr = getPlans();
 if(confirm("Delete this plan?")){
 arr.splice(i,1);
 savePlans(arr);
 loadPlans();
 }
}

/* ANALYTICS */
function updateAnalytics(arr){
 let total = arr.length;
 let today = 0;

 // Extracts just the calendar date section safely for string matching
 let todayDate = new Date().toLocaleDateString();

 arr.forEach(p=>{
 // Cross-checks date string segments reliably
 if(p.date && p.date.includes(todayDate)){
 today++;
 }
 });

 document.getElementById("analytics").innerHTML = `
 📊 <b>Total Plans:</b> ${total} <br>
 📅 <b>Today's Plans:</b> ${today}
 `;
}

/* BACK */
function goBack(){
 window.location = "task.html";
}

/* INIT */
loadPlans();
</script>

</body>
</html>
